<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#090b16"/>
    <stop offset="100%" stop-color="#10132a"/>
  </linearGradient>
  <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#6366f1"/>
    <stop offset="100%" stop-color="#4f46e5"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-10%" width="140%" height="130%">
    <feDropShadow dx="0" dy="12" stdDeviation="28" flood-color="#000" flood-opacity="0.7"/>
  </filter>
  <clipPath id="popupClip">
    <rect width="420" height="580" rx="14"/>
  </clipPath>
</defs>

<!-- Background -->
<rect width="1280" height="800" fill="url(#bg)"/>
<circle cx="1080" cy="120" r="240" fill="#6366f1" opacity="0.04"/>
<circle cx="160" cy="720" r="180" fill="#4f46e5" opacity="0.04"/>

<!-- ===== POPUP (420x580) at x=80, y=110 ===== -->
<g transform="translate(80,110)" filter="url(#shadow)">
  <g clip-path="url(#popupClip)">
    <!-- App background -->
    <rect width="420" height="580" fill="#0d0f1a"/>

    <!-- ---- Header ---- -->
    <rect width="420" height="52" fill="#111327"/>
    <line x1="0" y1="52" x2="420" y2="52" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <!-- Logo icon -->
    <rect x="12" y="12" width="28" height="28" rx="8" fill="url(#logoGrad)"/>
    <rect x="18" y="24" width="16" height="8" rx="4" fill="rgba(255,255,255,0.28)"/>
    <circle cx="30" cy="28" r="5" fill="white"/>
    <!-- Logo text -->
    <text x="48" y="31" font-size="15" font-weight="700" fill="#a5b4fc" letter-spacing="-0.3">SwitchBot</text>
    <!-- Refresh btn -->
    <path d="M385 22 a7 7 0 1 1-2 4.5" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <polyline points="383,22 383,27 388,27" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Settings btn -->
    <circle cx="408" cy="26" r="3.5" stroke="#94a3b8" stroke-width="1.8" fill="none"/>
    <path d="M408 18v3M408 31v2M400 26h2M414 26h2" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>

    <!-- ---- Search bar ---- -->
    <rect x="12" y="60" width="396" height="34" rx="17" fill="#1a1d35" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <circle cx="30" cy="77" r="6" stroke="#475569" stroke-width="1.8" fill="none"/>
    <line x1="34.5" y1="81.5" x2="37" y2="84" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    <text x="46" y="81" font-size="12.5" fill="#475569">デバイスを検索...</text>

    <!-- ---- Filter tabs ---- -->
    <g transform="translate(12,102)">
      <!-- すべて (active) -->
      <rect width="48" height="24" rx="12" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
      <text x="24" y="16" text-anchor="middle" font-size="11.5" font-weight="500" fill="#818cf8">すべて</text>
      <!-- ライト -->
      <rect x="52" width="44" height="24" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <text x="74" y="16" text-anchor="middle" font-size="11.5" fill="#94a3b8">ライト</text>
      <!-- 空調 -->
      <rect x="100" width="40" height="24" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <text x="120" y="16" text-anchor="middle" font-size="11.5" fill="#94a3b8">空調</text>
      <!-- セキュリティ -->
      <rect x="144" width="68" height="24" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <text x="178" y="16" text-anchor="middle" font-size="11.5" fill="#94a3b8">セキュリティ</text>
      <!-- カーテン -->
      <rect x="216" width="56" height="24" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <text x="244" y="16" text-anchor="middle" font-size="11.5" fill="#94a3b8">カーテン</text>
      <!-- センサー -->
      <rect x="276" width="56" height="24" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <text x="304" y="16" text-anchor="middle" font-size="11.5" fill="#94a3b8">センサー</text>
    </g>

    <!-- ---- Device Grid ---- -->
    <!-- Card 1: CO2センサー (left) -->
    <g transform="translate(12,138)">
      <rect width="194" height="118" rx="14" fill="#141627" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <rect width="194" height="2" rx="1" fill="#34d399" opacity="0.7"/>
      <!-- icon -->
      <rect x="12" y="12" width="36" height="36" rx="10" fill="rgba(52,211,153,0.15)"/>
      <rect x="18" y="21" width="24" height="16" rx="2" stroke="#34d399" stroke-width="1.5" fill="none"/>
      <circle cx="24" cy="29" r="2" fill="#34d399"/>
      <circle cx="30" cy="29" r="2.5" fill="#34d399"/>
      <circle cx="36" cy="29" r="2" fill="#34d399"/>
      <!-- name -->
      <text x="56" y="26" font-size="12.5" font-weight="600" fill="#e2e8f0">CO2センサー</text>
      <text x="56" y="39" font-size="10.5" fill="#475569">CO2センサ</text>
      <rect x="140" y="14" width="42" height="16" rx="8" fill="rgba(52,211,153,0.15)"/>
      <text x="161" y="25" text-anchor="middle" font-size="10" font-weight="700" fill="#34d399">アクティブ</text>
      <!-- sensor data -->
      <rect x="12" y="56" width="170" height="30" rx="5" fill="rgba(0,0,0,0.2)"/>
      <text x="22" y="75" font-size="18" font-weight="700" fill="#e2e8f0">945</text>
      <text x="52" y="75" font-size="10" fill="#94a3b8">ppm</text>
      <text x="80" y="75" font-size="11.5" fill="#94a3b8">🌡 28.9°C</text>
      <text x="138" y="75" font-size="11.5" fill="#94a3b8">💧 26%</text>
      <!-- battery -->
      <text x="12" y="108" font-size="10.5" fill="#475569">🔋 100%</text>
    </g>

    <!-- Card 2: 温湿度計 (right) -->
    <g transform="translate(214,138)">
      <rect width="194" height="118" rx="14" fill="#141627" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <rect width="194" height="2" rx="1" fill="#34d399" opacity="0.7"/>
      <!-- icon -->
      <rect x="12" y="12" width="36" height="36" rx="10" fill="rgba(52,211,153,0.15)"/>
      <path d="M26 27v-7a3 3 0 0 1 6 0v7a5 5 0 1 1-6 0z" stroke="#34d399" stroke-width="1.7" fill="none" stroke-linecap="round"/>
      <!-- name -->
      <text x="56" y="26" font-size="12.5" font-weight="600" fill="#e2e8f0">温湿度計</text>
      <text x="56" y="39" font-size="10.5" fill="#475569">温度計</text>
      <rect x="138" y="14" width="42" height="16" rx="8" fill="rgba(52,211,153,0.15)"/>
      <text x="159" y="25" text-anchor="middle" font-size="10" font-weight="700" fill="#34d399">アクティブ</text>
      <!-- sensor -->
      <rect x="12" y="56" width="170" height="30" rx="5" fill="rgba(0,0,0,0.2)"/>
      <text x="20" y="75" font-size="11.5" fill="#94a3b8">🌡 21.2°C</text>
      <text x="90" y="75" font-size="11.5" fill="#94a3b8">💧 41%</text>
      <text x="20" y="108" font-size="10.5" fill="#475569">🔋 100%</text>
    </g>

    <!-- Card 3: ロック (left) -->
    <g transform="translate(12,264)">
      <rect width="194" height="118" rx="14" fill="#141627" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <rect width="194" height="2" rx="1" fill="#f87171" opacity="0.7"/>
      <rect x="12" y="12" width="36" height="36" rx="10" fill="rgba(248,113,113,0.15)"/>
      <rect x="19" y="27" width="20" height="16" rx="2" stroke="#f87171" stroke-width="1.7" fill="none"/>
      <path d="M23 27v-4a6 6 0 0 1 12 0v4" stroke="#f87171" stroke-width="1.7" fill="none" stroke-linecap="round"/>
      <text x="56" y="26" font-size="12.5" font-weight="600" fill="#e2e8f0">ロック</text>
      <text x="56" y="39" font-size="10.5" fill="#475569">スマートロック</text>
      <rect x="140" y="14" width="42" height="16" rx="8" fill="rgba(248,113,113,0.15)"/>
      <text x="161" y="25" text-anchor="middle" font-size="10" font-weight="700" fill="#f87171">施錠中</text>
      <!-- battery -->
      <rect x="12" y="56" width="170" height="20" rx="5" fill="rgba(0,0,0,0.2)"/>
      <text x="20" y="70" font-size="11.5" fill="#94a3b8">🔋 100%</text>
      <!-- buttons -->
      <rect x="12" y="84" width="82" height="24" rx="5" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.35)" stroke-width="1"/>
      <text x="53" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#6ee7b7">🔓 解錠</text>
      <rect x="100" y="84" width="82" height="24" rx="5" fill="rgba(248,113,113,0.12)" stroke="rgba(248,113,113,0.35)" stroke-width="1"/>
      <text x="141" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#fca5a5">🔒 施錠</text>
    </g>

    <!-- Card 4: ハブ2 (right) -->
    <g transform="translate(214,264)">
      <rect width="194" height="118" rx="14" fill="#141627" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <rect width="194" height="2" rx="1" fill="#6366f1" opacity="0.7"/>
      <rect x="12" y="12" width="36" height="36" rx="10" fill="rgba(99,102,241,0.15)"/>
      <circle cx="30" cy="30" r="5" stroke="#6366f1" stroke-width="1.7" fill="none"/>
      <path d="M22 38a11 11 0 0 1 0-16" stroke="#6366f1" stroke-width="1.7" fill="none" stroke-linecap="round"/>
      <path d="M38 22a11 11 0 0 1 0 16" stroke="#6366f1" stroke-width="1.7" fill="none" stroke-linecap="round"/>
      <text x="56" y="26" font-size="12.5" font-weight="600" fill="#e2e8f0">ハブ2</text>
      <text x="56" y="39" font-size="10.5" fill="#475569">ハブ2</text>
      <rect x="140" y="14" width="42" height="16" rx="8" fill="rgba(52,211,153,0.15)"/>
      <text x="161" y="25" text-anchor="middle" font-size="10" font-weight="700" fill="#34d399">接続中</text>
      <rect x="12" y="56" width="170" height="30" rx="5" fill="rgba(0,0,0,0.2)"/>
      <text x="20" y="75" font-size="11.5" fill="#94a3b8">🌡 28.8°C</text>
      <text x="100" y="75" font-size="11.5" fill="#94a3b8">💧 32%</text>
    </g>

    <!-- Card 5: カーテン (left) -->
    <g transform="translate(12,390)">
      <rect width="194" height="128" rx="14" fill="#141627" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <rect width="194" height="2" rx="1" fill="#a78bfa" opacity="0.7"/>
      <rect x="12" y="12" width="36" height="36" rx="10" fill="rgba(167,139,250,0.15)"/>
      <path d="M18 18h22M18 18v22M40 18v22" stroke="#a78bfa" stroke-width="1.7" fill="none" stroke-linecap="round"/>
      <path d="M18 18c2 5 3 10 3 15M40 18c-2 5-3 10-3 15" stroke="#a78bfa" stroke-width="1.7" fill="none"/>
      <text x="56" y="26" font-size="12.5" font-weight="600" fill="#e2e8f0">カーテン</text>
      <text x="56" y="39" font-size="10.5" fill="#475569">カーテン</text>
      <rect x="156" y="14" width="26" height="16" rx="5" fill="rgba(71,85,105,0.3)"/>
      <text x="169" y="25" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8">IR</text>
      <!-- slider -->
      <text x="12" y="70" font-size="10.5" fill="#475569">開度</text>
      <rect x="12" y="75" width="154" height="3" rx="1.5" fill="#1e2240"/>
      <circle cx="157" cy="76.5" r="6" fill="#6366f1"/>
      <text x="175" y="80" font-size="11" font-weight="700" fill="#94a3b8">10</text>
      <!-- buttons -->
      <rect x="12" y="90" width="52" height="24" rx="5" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.35)" stroke-width="1"/>
      <text x="38" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">↑ 開く</text>
      <rect x="70" y="90" width="54" height="24" rx="5" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
      <text x="97" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#a5b4fc">⏸ 停止</text>
      <rect x="130" y="90" width="52" height="24" rx="5" fill="rgba(71,85,105,0.2)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <text x="156" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">↓ 閉じる</text>
    </g>

    <!-- Card 6: エアコン (right) -->
    <g transform="translate(214,390)">
      <rect width="194" height="128" rx="14" fill="#141627" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <rect width="194" height="2" rx="1" fill="#60a5fa" opacity="0.7"/>
      <rect x="12" y="12" width="36" height="36" rx="10" fill="rgba(96,165,250,0.15)"/>
      <rect x="17" y="18" width="24" height="14" rx="2" stroke="#60a5fa" stroke-width="1.7" fill="none"/>
      <path d="M22 32v4M29 32v5M36 32v4" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M20 25h18" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
      <text x="56" y="26" font-size="12.5" font-weight="600" fill="#e2e8f0">エアコン</text>
      <text x="56" y="39" font-size="10.5" fill="#475569">エアコン</text>
      <rect x="156" y="14" width="26" height="16" rx="5" fill="rgba(71,85,105,0.3)"/>
      <text x="169" y="25" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8">IR</text>
      <!-- temp + mode -->
      <text x="12" y="68" font-size="22" font-weight="700" fill="#e2e8f0">26°C</text>
      <rect x="68" y="54" width="38" height="16" rx="4" fill="rgba(96,165,250,0.12)"/>
      <text x="87" y="65" text-anchor="middle" font-size="10" font-weight="600" fill="#60a5fa">COOL</text>
      <!-- buttons row 1 -->
      <rect x="12" y="76" width="38" height="20" rx="5" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.4)" stroke-width="1"/>
      <text x="31" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#34d399">ON</text>
      <rect x="55" y="76" width="38" height="20" rx="5" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
      <text x="74" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#fca5a5">OFF</text>
      <rect x="98" y="76" width="20" height="20" rx="5" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
      <text x="108" y="90" text-anchor="middle" font-size="12" fill="#a5b4fc">▾</text>
      <rect x="122" y="76" width="20" height="20" rx="5" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.35)" stroke-width="1"/>
      <text x="132" y="90" text-anchor="middle" font-size="12" fill="#93c5fd">▴</text>
      <!-- buttons row 2 -->
      <rect x="12" y="100" width="52" height="20" rx="5" fill="rgba(71,85,105,0.2)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <text x="38" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">自動</text>
      <rect x="68" y="100" width="52" height="20" rx="5" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.35)" stroke-width="1"/>
      <text x="94" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">冷房</text>
      <rect x="124" y="100" width="52" height="20" rx="5" fill="rgba(71,85,105,0.2)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <text x="150" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">暖房</text>
    </g>

    <!-- ---- Footer ---- -->
    <rect x="0" y="548" width="420" height="32" fill="#111327"/>
    <line x1="0" y1="548" x2="420" y2="548" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <text x="14" y="568" font-size="11" fill="#475569">6 デバイス</text>
    <text x="310" y="568" font-size="10.5" fill="#475569">更新: 33秒前</text>
  </g>
  <!-- Popup border -->
  <rect width="420" height="580" rx="14" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
</g>

<!-- ===== Right side: description ===== -->
<g transform="translate(600,110)">
  <text x="0" y="52" font-size="32" font-weight="700" fill="white" letter-spacing="-0.5">スマートホームデバイスを</text>
  <text x="0" y="96" font-size="32" font-weight="700" fill="#818cf8" letter-spacing="-0.5">ブラウザから一括管理</text>
  <line x1="0" y1="118" x2="80" y2="118" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>

  <!-- Features -->
  <g transform="translate(0,148)">
    <!-- Feature 1 -->
    <rect width="40" height="40" rx="10" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.25)" stroke-width="1"/>
    <text x="20" y="26" text-anchor="middle" font-size="18" fill="#34d399">🏠</text>
    <text x="52" y="20" font-size="16" font-weight="600" fill="#e2e8f0">20種類以上のデバイスに対応</text>
    <text x="52" y="40" font-size="13" fill="#64748b">照明・エアコン・カーテン・ロック・センサーなど</text>

    <!-- Feature 2 -->
    <rect y="68" width="40" height="40" rx="10" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
    <text x="20" y="94" text-anchor="middle" font-size="18" fill="#818cf8">⚡</text>
    <text x="52" y="88" font-size="16" font-weight="600" fill="#e2e8f0">ワンクリックでリアルタイム操作</text>
    <text x="52" y="108" font-size="13" fill="#64748b">ポップアップから即座にデバイスを制御</text>

    <!-- Feature 3 -->
    <rect y="136" width="40" height="40" rx="10" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>
    <text x="20" y="162" text-anchor="middle" font-size="18" fill="#60a5fa">📊</text>
    <text x="52" y="156" font-size="16" font-weight="600" fill="#e2e8f0">センサーデータをリアルタイム表示</text>
    <text x="52" y="176" font-size="13" fill="#64748b">温度・湿度・CO2・電力消費量をひと目で確認</text>

    <!-- Feature 4 -->
    <rect y="204" width="40" height="40" rx="10" fill="rgba(248,113,113,0.12)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <text x="20" y="230" text-anchor="middle" font-size="18" fill="#f87171">🔒</text>
    <text x="52" y="224" font-size="16" font-weight="600" fill="#e2e8f0">APIキーはローカルに安全に保存</text>
    <text x="52" y="244" font-size="13" fill="#64748b">外部サーバーへの送信なし・完全ローカル管理</text>

    <!-- Feature 5 -->
    <rect y="272" width="40" height="40" rx="10" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
    <text x="20" y="298" text-anchor="middle" font-size="18" fill="#a78bfa">🔍</text>
    <text x="52" y="292" font-size="16" font-weight="600" fill="#e2e8f0">検索・カテゴリフィルタリング</text>
    <text x="52" y="312" font-size="13" fill="#64748b">キーワード検索とタブで素早くデバイスを探す</text>
  </g>

  <!-- Browser badge -->
  <g transform="translate(0,490)">
    <rect width="200" height="40" rx="8" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">Chrome / Firefox 対応</text>
    <rect x="210" width="150" height="40" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="285" y="25" text-anchor="middle" font-size="13" fill="#64748b">SwitchBot API v1.1</text>
  </g>
</g>
</svg>
