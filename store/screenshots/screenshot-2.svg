<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#1a1d35"/>
    </linearGradient>
    <linearGradient id="popupBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2035"/>
      <stop offset="100%" stop-color="#181a2e"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Background decoration -->
  <circle cx="200" cy="150" r="200" fill="#6366f1" opacity="0.04"/>
  <circle cx="1100" cy="650" r="250" fill="#7c3aed" opacity="0.04"/>
  <circle cx="900" cy="100" r="120" fill="#60a5fa" opacity="0.03"/>

  <!-- Grid dots decoration -->
  <g opacity="0.04">
    <rect x="640" y="0" width="640" height="800" fill="none"/>
  </g>

  <!-- Popup window shadow + frame -->
  <rect x="100" y="60" width="420" height="680" rx="16" fill="url(#popupBg)" filter="url(#shadow)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Header -->
  <rect x="100" y="60" width="420" height="56" rx="16" fill="url(#headerGrad)"/>
  <rect x="100" y="84" width="420" height="32" fill="url(#headerGrad)"/>

  <!-- Logo icon in header -->
  <rect x="118" y="74" width="28" height="28" rx="6" fill="rgba(255,255,255,0.2)"/>
  <rect x="124" y="83" width="16" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
  <circle cx="134" cy="87" r="5" fill="white"/>

  <!-- Header title -->
  <text x="156" y="93" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="white">SwitchBot Controller</text>

  <!-- Refresh icon (top right) -->
  <g transform="translate(490, 74)" opacity="0.8">
    <circle cx="12" cy="14" r="9" fill="none" stroke="white" stroke-width="1.5"/>
    <path d="M12 5 L12 9 M12 5 L9 8 M12 5 L15 8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Search bar -->
  <rect x="116" y="130" width="388" height="34" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="145" y="152" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">デバイスを検索...</text>

  <!-- Search icon -->
  <circle cx="133" cy="147" r="6" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="137" y1="151" x2="141" y2="155" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Filter tabs -->
  <rect x="116" y="176" width="388" height="32" rx="6" fill="rgba(255,255,255,0.04)"/>
  <!-- Active tab: 空調 -->
  <rect x="171" y="178" width="62" height="28" rx="5" fill="#5C6BC0"/>
  <text x="120" y="196" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">すべて</text>
  <text x="185" y="196" font-family="sans-serif" font-size="11" fill="white" font-weight="600">空調</text>
  <text x="246" y="196" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">ライト</text>
  <text x="300" y="196" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">錠前</text>
  <text x="345" y="196" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">カーテン</text>
  <text x="410" y="196" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">センサー</text>

  <!-- === AC Card (large, featured) === -->
  <rect x="116" y="222" width="388" height="170" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(96,165,250,0.3)" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- AC icon + name row -->
  <rect x="132" y="238" width="36" height="36" rx="8" fill="rgba(96,165,250,0.2)"/>
  <!-- Snowflake SVG paths for AC icon -->
  <line x1="150" y1="242" x2="150" y2="270" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="252" x2="160" y2="252" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="144" y1="246" x2="150" y2="252" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="156" y1="246" x2="150" y2="252" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="144" y1="258" x2="150" y2="252" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="156" y1="258" x2="150" y2="252" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>

  <text x="178" y="253" font-family="sans-serif" font-size="15" font-weight="600" fill="white">リビング エアコン</text>
  <text x="178" y="270" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">Virtual InfraRed</text>

  <!-- Power status badge -->
  <rect x="416" y="238" width="72" height="22" rx="11" fill="rgba(96,165,250,0.2)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
  <circle cx="430" cy="249" r="4" fill="#60a5fa"/>
  <text x="437" y="253" font-family="sans-serif" font-size="11" fill="#60a5fa">ON 26°C</text>

  <!-- Divider in card -->
  <line x1="132" y1="285" x2="488" y2="285" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Control buttons row 1: ON / OFF / Temp -->
  <rect x="132" y="295" width="58" height="30" rx="6" fill="#5C6BC0"/>
  <text x="161" y="315" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="white">ON</text>

  <rect x="198" y="295" width="58" height="30" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="227" y="315" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">OFF</text>

  <!-- Temp down -->
  <rect x="264" y="295" width="38" height="30" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="283" y="315" text-anchor="middle" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">▾</text>

  <!-- Temp display -->
  <rect x="308" y="295" width="50" height="30" rx="6" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <text x="333" y="314" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#60a5fa">26°C</text>

  <!-- Temp up -->
  <rect x="364" y="295" width="38" height="30" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="383" y="315" text-anchor="middle" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">▴</text>

  <!-- Control buttons row 2: Mode selection (highlighted) -->
  <!-- 自動 -->
  <rect x="132" y="335" width="108" height="32" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="186" y="355" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">自動</text>

  <!-- 冷房 (selected/active) -->
  <rect x="248" y="335" width="108" height="32" rx="6" fill="rgba(96,165,250,0.25)" stroke="rgba(96,165,250,0.6)" stroke-width="1.5"/>
  <text x="254" y="350" font-family="sans-serif" font-size="10" fill="#60a5fa">❄️</text>
  <text x="302" y="355" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#60a5fa">冷房</text>

  <!-- 暖房 -->
  <rect x="364" y="335" width="108" height="32" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="370" y="350" font-family="sans-serif" font-size="10" fill="rgba(255,150,100,0.6)">🔥</text>
  <text x="418" y="355" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">暖房</text>

  <!-- Mode selection label -->
  <text x="132" y="384" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">モード選択中: 冷房</text>

  <!-- === Fan Card === -->
  <rect x="116" y="406" width="188" height="120" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Fan icon -->
  <rect x="132" y="420" width="32" height="32" rx="7" fill="rgba(129,140,248,0.2)"/>
  <circle cx="148" cy="436" r="3" fill="#818cf8"/>
  <path d="M148 433c0-4 2-6 5-5 2 1 1 4-5 5z" fill="#818cf8" stroke="none"/>
  <path d="M151 436c4 0 6 2 5 5-1 2-4 1-5-5z" fill="#818cf8" stroke="none"/>
  <path d="M148 439c0 4-2 6-5 5-2-1-1-4 5-5z" fill="#818cf8" stroke="none"/>
  <path d="M145 436c-4 0-6-2-5-5 1-2 4-1 5 5z" fill="#818cf8" stroke="none"/>

  <text x="174" y="433" font-family="sans-serif" font-size="13" font-weight="600" fill="white">扇風機</text>
  <text x="174" y="449" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Fan</text>

  <line x1="132" y1="462" x2="288" y2="462" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <rect x="132" y="472" width="54" height="26" rx="5" fill="rgba(129,140,248,0.3)" stroke="rgba(129,140,248,0.5)" stroke-width="1"/>
  <text x="159" y="489" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#818cf8">ON</text>

  <rect x="194" y="472" width="54" height="26" rx="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="221" y="489" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">OFF</text>

  <!-- Speed indicator -->
  <text x="132" y="512" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">風量: 2</text>

  <!-- === Plug Card === -->
  <rect x="316" y="406" width="188" height="120" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Plug icon -->
  <rect x="332" y="420" width="32" height="32" rx="7" fill="rgba(251,191,36,0.15)"/>
  <rect x="340" y="424" width="4" height="8" rx="1" fill="#fbbf24"/>
  <rect x="347" y="424" width="4" height="8" rx="1" fill="#fbbf24"/>
  <path d="M339 432 h13 a7 7 0 0 1 0 14 h-13 z" fill="none" stroke="#fbbf24" stroke-width="1.5"/>

  <text x="374" y="433" font-family="sans-serif" font-size="13" font-weight="600" fill="white">スマートプラグ</text>
  <text x="374" y="449" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Plug Mini</text>

  <line x1="332" y1="462" x2="488" y2="462" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <rect x="332" y="472" width="54" height="26" rx="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="359" y="489" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">ON</text>

  <rect x="394" y="472" width="54" height="26" rx="5" fill="rgba(239,68,68,0.25)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="421" y="489" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ef4444">OFF</text>

  <text x="332" y="512" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">消費電力: 0W</text>

  <!-- Footer -->
  <line x1="100" y1="706" x2="520" y2="706" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="155" y="726" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">最終更新: 13:24:05</text>
  <text x="420" y="726" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">3 デバイス</text>
  <rect x="100" y="706" width="420" height="34" rx="0 0 16 16" fill="rgba(255,255,255,0.02)"/>

  <!-- ======== Right side: feature callouts ======== -->

  <!-- Feature highlight title -->
  <text x="590" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="800" fill="white">エアコン制御</text>
  <text x="590" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.55)">ワンクリックでモード切り替え</text>

  <!-- Divider -->
  <rect x="590" y="198" width="60" height="3" rx="2" fill="#5C6BC0"/>

  <!-- Feature list -->

  <!-- Feature 1: Mode selection -->
  <g transform="translate(590, 235)">
    <rect width="44" height="44" rx="10" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
    <text x="22" y="30" text-anchor="middle" font-size="22" fill="#60a5fa">❄️</text>
    <text x="64" y="18" font-family="sans-serif" font-size="16" font-weight="600" fill="white">冷房 / 暖房 / 自動モード</text>
    <text x="64" y="38" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">3種類のモードをボタンひとつで切り替え</text>
  </g>

  <!-- Feature 2: Temperature -->
  <g transform="translate(590, 315)">
    <rect width="44" height="44" rx="10" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.25)" stroke-width="1"/>
    <text x="22" y="30" text-anchor="middle" font-size="22" fill="#fbbf24">🌡️</text>
    <text x="64" y="18" font-family="sans-serif" font-size="16" font-weight="600" fill="white">温度設定（16〜30°C）</text>
    <text x="64" y="38" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">▴ / ▾ ボタンで1°Cずつ調整</text>
  </g>

  <!-- Feature 3: ON/OFF -->
  <g transform="translate(590, 395)">
    <rect width="44" height="44" rx="10" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.25)" stroke-width="1"/>
    <text x="22" y="30" text-anchor="middle" font-size="22" fill="#34d399">⚡</text>
    <text x="64" y="18" font-family="sans-serif" font-size="16" font-weight="600" fill="white">電源オン / オフ</text>
    <text x="64" y="38" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">赤外線リモコン互換デバイスに対応</text>
  </g>

  <!-- Feature 4: Multiple devices -->
  <g transform="translate(590, 475)">
    <rect width="44" height="44" rx="10" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
    <text x="22" y="30" text-anchor="middle" font-size="22" fill="#a78bfa">📱</text>
    <text x="64" y="18" font-family="sans-serif" font-size="16" font-weight="600" fill="white">20種類以上のデバイス対応</text>
    <text x="64" y="38" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">照明・カーテン・ロック・センサーなど</text>
  </g>

  <!-- Bottom CTA area -->
  <rect x="590" y="570" width="600" height="90" rx="14" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="620" y="605" font-family="sans-serif" font-size="14" font-weight="600" fill="white">SwitchBot Controller</text>
  <text x="620" y="627" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">SwitchBot API v1.1 対応 ・ Chrome / Firefox 対応</text>
  <text x="620" y="647" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">APIキーはローカルに保存。外部サーバーへの送信なし。</text>

  <!-- Shield icon -->
  <g transform="translate(1130, 595)">
    <path d="M30 4 L56 14 L56 34 C56 50 30 60 30 60 C30 60 4 50 4 34 L4 14 Z" fill="none" stroke="rgba(99,102,241,0.5)" stroke-width="2"/>
    <path d="M20 32 L27 39 L42 24" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
