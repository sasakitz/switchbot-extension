<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#1a1d35"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="380" cy="40" r="80" fill="#6366f1" opacity="0.06"/>
  <circle cx="60" cy="240" r="60" fill="#6366f1" opacity="0.05"/>

  <!-- App icon -->
  <rect x="30" y="80" width="64" height="64" rx="16" fill="url(#iconGrad)" filter="url(#glow)"/>
  <!-- Toggle track -->
  <rect x="42" y="104" width="40" height="16" rx="8" fill="rgba(255,255,255,0.25)"/>
  <!-- Toggle knob -->
  <circle cx="74" cy="112" r="9" fill="white"/>

  <!-- App name -->
  <text x="112" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="700" fill="white" letter-spacing="-0.5">SwitchBot</text>
  <text x="112" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" font-weight="400" fill="#818cf8">Controller</text>

  <!-- Divider -->
  <line x1="30" y1="165" x2="410" y2="165" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Feature icons row -->
  <!-- Light -->
  <g transform="translate(40, 190)">
    <rect width="70" height="56" rx="10" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
    <text x="35" y="26" text-anchor="middle" font-size="20" fill="#fbbf24">💡</text>
    <text x="35" y="46" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">ライト</text>
  </g>
  <!-- AC -->
  <g transform="translate(125, 190)">
    <rect width="70" height="56" rx="10" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
    <text x="35" y="26" text-anchor="middle" font-size="20" fill="#60a5fa">❄️</text>
    <text x="35" y="46" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">エアコン</text>
  </g>
  <!-- Lock -->
  <g transform="translate(210, 190)">
    <rect width="70" height="56" rx="10" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
    <text x="35" y="26" text-anchor="middle" font-size="20" fill="#f87171">🔒</text>
    <text x="35" y="46" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">ロック</text>
  </g>
  <!-- Curtain -->
  <g transform="translate(295, 190)">
    <rect width="70" height="56" rx="10" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <text x="35" y="26" text-anchor="middle" font-size="20" fill="#a78bfa">🪟</text>
    <text x="35" y="46" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">カーテン</text>
  </g>
  <!-- Sensor -->
  <g transform="translate(380, 190)">
    <rect width="70" height="56" rx="10" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
    <text x="35" y="26" text-anchor="middle" font-size="20" fill="#34d399">🌡️</text>
    <text x="35" y="46" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">センサー</text>
  </g>
</svg>
