<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="trackHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="knobShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="2" stdDeviation="2.5" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
  </defs>

  <!-- Toggle track (pill shape) -->
  <rect x="11" y="32" width="106" height="64" rx="32" ry="32" fill="url(#track)"/>

  <!-- Track top highlight -->
  <rect x="11" y="32" width="106" height="64" rx="32" ry="32" fill="url(#trackHighlight)"/>

  <!-- Knob (white circle, ON position = right) -->
  <circle cx="85" cy="64" r="26" fill="white" filter="url(#knobShadow)"/>
</svg>
