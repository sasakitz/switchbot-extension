<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SwitchBot Icon Generator</title>
  <style>
    body {
      background: #0d0f1a;
      color: #e2e8f0;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 24px;
    }
    h1 { font-size: 20px; color: #34d399; }
    p  { color: #94a3b8; font-size: 13px; text-align: center; max-width: 480px; line-height: 1.6; }
    .canvases { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
    .canvas-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .label { font-size: 12px; color: #64748b; }
    canvas { border-radius: 20%; border: 1px solid rgba(255,255,255,0.1); }
    .btn {
      padding: 10px 24px;
      background: #059669;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #34d399; }
    .note {
      background: rgba(5,150,105,0.1);
      border: 1px solid rgba(5,150,105,0.25);
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 12.5px;
      color: #34d399;
      max-width: 520px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>SwitchBot Icon Generator</h1>
  <p>下のボタンをクリックすると、拡張機能用のPNGアイコンが生成されてダウンロードされます。<br>ダウンロードされたファイルをこの <code>icons/</code> フォルダに配置してください。</p>

  <div class="canvases">
    <div class="canvas-wrap">
      <canvas id="c128" width="128" height="128"></canvas>
      <span class="label">128×128</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="c48" width="48" height="48"></canvas>
      <span class="label">48×48</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="c32" width="32" height="32"></canvas>
      <span class="label">32×32</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="c16" width="16" height="16"></canvas>
      <span class="label">16×16</span>
    </div>
  </div>

  <button class="btn" onclick="downloadAll()">全サイズをダウンロード</button>

  <div class="note">
    ダウンロード後、<strong>icon16.png, icon32.png, icon48.png, icon128.png</strong> を<br>
    <code>switchbot-extension/icons/</code> フォルダに配置してください。
  </div>

  <script>
    function drawIcon(canvas) {
      const size = canvas.width;
      const ctx = canvas.getContext('2d');
      const cx = size / 2;
      const cy = size / 2;

      // Toggle track dimensions
      const trackW = size * 0.82;
      const trackH = size * 0.50;
      const trackX = (size - trackW) / 2;
      const trackY = (size - trackH) / 2;
      const trackR = trackH / 2; // fully-rounded pill

      // Draw track with horizontal green gradient
      const grad = ctx.createLinearGradient(trackX, 0, trackX + trackW, 0);
      grad.addColorStop(0, '#34d399');
      grad.addColorStop(1, '#059669');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(trackX, trackY, trackW, trackH, trackR);
      ctx.fill();

      // Top highlight on track
      const highlight = ctx.createLinearGradient(0, trackY, 0, trackY + trackH * 0.5);
      highlight.addColorStop(0, 'rgba(255,255,255,0.22)');
      highlight.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = highlight;
      ctx.beginPath();
      ctx.roundRect(trackX, trackY, trackW, trackH, trackR);
      ctx.fill();

      // Knob shadow
      const knobCx = trackX + trackW - trackR;
      const knobCy = cy;
      const knobR = trackR * 0.80;
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.28)';
      ctx.shadowBlur = size * 0.04;
      ctx.shadowOffsetX = size * 0.025;
      ctx.shadowOffsetY = size * 0.025;
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(knobCx, knobCy, knobR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Knob (white circle, ON = right)
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(knobCx, knobCy, knobR, 0, Math.PI * 2);
      ctx.fill();
    }

    const sizes = [
      { id: 'c128', name: 'icon128.png' },
      { id: 'c48',  name: 'icon48.png'  },
      { id: 'c32',  name: 'icon32.png'  },
      { id: 'c16',  name: 'icon16.png'  },
    ];

    sizes.forEach(({ id }) => {
      drawIcon(document.getElementById(id));
    });

    function downloadAll() {
      sizes.forEach(({ id, name }) => {
        const canvas = document.getElementById(id);
        const a = document.createElement('a');
        a.download = name;
        a.href = canvas.toDataURL('image/png');
        a.click();
      });
    }
  </script>
</body>
</html>
